name: Deploy EA to MT5

on:
  push:
    branches: [main]
    paths:
      - '**.mq5'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload .mq5 files to server staging
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
          USER: ${{ secrets.SERVER_USER }}
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no "$USER@$HOST" "mkdir -p /tmp/mt5deploy"
          sshpass -e scp -o StrictHostKeyChecking=no *.mq5 "$USER@$HOST:/tmp/mt5deploy/"

      - name: Deploy EAs to Experts folders, Scripts to Scripts folders
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
          USER: ${{ secrets.SERVER_USER }}
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no "$USER@$HOST" bash << 'ENDSSH'
            EXPERTS_DIRS=(
              "/root/.wine/drive_c/Program Files/Equiti Brokerage (Seychelles) MT5 Terminal/MQL5/Experts"
              "/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts"
              "/root/.wine_puprime/drive_c/Program Files/MetaTrader 5/MQL5/Experts"
              "/root/.wine_tmgm/drive_c/Program Files/MetaTrader 5/MQL5/Experts"
            )
            SCRIPTS_DIRS=(
              "/root/.wine/drive_c/Program Files/Equiti Brokerage (Seychelles) MT5 Terminal/MQL5/Scripts"
              "/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Scripts"
              "/root/.wine_puprime/drive_c/Program Files/MetaTrader 5/MQL5/Scripts"
              "/root/.wine_tmgm/drive_c/Program Files/MetaTrader 5/MQL5/Scripts"
            )

            # EA files → Experts (all except *Export* and *Script*)
            EA_FILES=$(ls /tmp/mt5deploy/*.mq5 | grep -iv "Export\|Script" 2>/dev/null)
            for dir in "${EXPERTS_DIRS[@]}"; do
              [ -d "$dir" ] && cp $EA_FILES "$dir/" && echo "EA OK → $dir"
            done

            # Script/Export files → Scripts
            SCRIPT_FILES=$(ls /tmp/mt5deploy/*.mq5 | grep -i "Export\|Script" 2>/dev/null)
            for dir in "${SCRIPTS_DIRS[@]}"; do
              [ -d "$dir" ] && cp $SCRIPT_FILES "$dir/" && echo "Script OK → $dir"
            done

            rm -rf /tmp/mt5deploy
            echo "Deploy complete: $(date)"
          ENDSSH
