<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVA VA — Home</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #141a2b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text: #e6ebf5;
      --muted: #9aa6bf;
      --border: #233048;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
    }
    .brand { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .brand span { color: var(--accent); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 24px;
      font-size: 15px;
    }
    nav a:hover { color: var(--text); }
    .hero {
      max-width: 820px;
      margin: 0 auto;
      padding: 96px 32px;
      text-align: center;
    }
    .hero h1 { font-size: 44px; line-height: 1.15; margin: 0 0 16px; }
    .hero p { font-size: 18px; color: var(--muted); margin: 0 0 32px; }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.15s ease;
    }
    .btn:hover { background: var(--accent-hover); }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 32px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">NOVA <span>VA</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="platform.html">Platform</a>
    </nav>
  </header>

  <main class="hero">
    <h1>Welcome to NOVA VA</h1>
    <p>Automated trading strategies and Expert Advisors, all in one place.</p>
    <a class="btn" href="platform.html">Go to Platform</a>
  </main>

  <footer>&copy; 2026 NOVA VA. All rights reserved.</footer>
</body>
</html>
