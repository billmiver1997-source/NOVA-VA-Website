<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVA VA — Platform</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #141a2b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text: #e6ebf5;
      --muted: #9aa6bf;
      --border: #233048;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
    }
    .brand { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .brand span { color: var(--accent); }
    /* Back to Home button (top right) */
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.15s ease;
    }
    .back-home:hover { background: var(--accent-hover); }
    .back-home svg { width: 16px; height: 16px; }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 64px 32px;
    }
    h1 { font-size: 34px; margin: 0 0 12px; }
    p.lead { color: var(--muted); font-size: 17px; margin: 0 0 40px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .card h3 { margin: 0 0 8px; font-size: 18px; }
    .card p { margin: 0; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">NOVA <span>VA</span> — Platform</div>
    <a class="back-home" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12l9-9 9 9" />
        <path d="M9 21V12h6v9" />
      </svg>
      Back to Home
    </a>
  </header>

  <main>
    <h1>Trading Platform</h1>
    <p class="lead">Manage and monitor your automated strategies.</p>

    <div class="grid">
      <div class="card">
        <h3>Expert Advisors</h3>
        <p>Deploy and manage your MT5 Expert Advisors.</p>
      </div>
      <div class="card">
        <h3>Performance</h3>
        <p>Track live and backtested performance metrics.</p>
      </div>
      <div class="card">
        <h3>Signals</h3>
        <p>Review the latest strategy signals and alerts.</p>
      </div>
    </div>
  </main>
</body>
</html>
